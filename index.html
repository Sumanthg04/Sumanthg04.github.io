<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumanth G | Graphic Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .page { display: none; min-height: calc(100vh - 80px); }
        .page.active { display: block; animation: pageFade 0.3s ease-out; }
        @keyframes pageFade { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { color: #2563eb !important; border-bottom: 2px solid #2563eb; }
        #mobile-menu { transition: 0.3s ease-in-out; clip-path: circle(0% at 100% 0%); }
        #mobile-menu.open { clip-path: circle(150% at 100% 0%); }
    </style>
</head>
<body class="text-slate-900">

    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="container mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="showPage('home')">
                <div class="bg-blue-600 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl">S</div>
                <span class="font-extrabold text-xl tracking-tighter uppercase italic">Sumanth <span class="text-blue-600">G.</span></span>
            </div>
            <div class="hidden md:flex space-x-8 font-bold text-xs uppercase tracking-widest text-slate-500">
                <button onclick="showPage('home')" class="nav-btn transition hover:text-blue-600 py-2" data-page="home">Home</button>
                <button onclick="showPage('about')" class="nav-btn transition hover:text-blue-600 py-2" data-page="about">About</button>
                <button onclick="showPage('projects')" class="nav-btn transition hover:text-blue-600 py-2" data-page="projects">Portfolio</button>
                <button onclick="showPage('services')" class="nav-btn transition hover:text-blue-600 py-2" data-page="services">Services</button>
                <button onclick="showPage('contact')" class="nav-btn transition hover:text-blue-600 py-2" data-page="contact">Contact</button>
                <button onclick="accessAdmin()" class="text-slate-300 hover:text-blue-600 transition"><i class="fa-solid fa-lock"></i></button>
            </div>
            <button class="md:hidden text-2xl" onclick="toggleMenu(true)"><i class="fa-solid fa-bars-staggered"></i></button>
        </div>
    </nav>

    <div id="mobile-menu" class="fixed inset-0 bg-blue-600 z-[60] flex flex-col justify-center items-center text-white space-y-8 text-3xl font-black md:hidden">
        <button class="absolute top-6 right-6 text-4xl" onclick="toggleMenu(false)">&times;</button>
        <span onclick="showPage('home'); toggleMenu(false)">HOME</span>
        <span onclick="showPage('about'); toggleMenu(false)">ABOUT</span>
        <span onclick="showPage('projects'); toggleMenu(false)">PORTFOLIO</span>
        <span onclick="showPage('services'); toggleMenu(false)">SERVICES</span>
        <span onclick="showPage('contact'); toggleMenu(false)">CONTACT</span>
        <span onclick="accessAdmin(); toggleMenu(false)" class="text-blue-200 text-xl">ADMIN LOGIN</span>
    </div>

    <main class="mt-20">
        <section id="home" class="page active container mx-auto px-4 flex flex-col items-center justify-center text-center py-20">
            <h1 class="text-5xl md:text-8xl font-black mb-6 uppercase">Design <br><span class="text-blue-600">Expert.</span></h1>
            <p class="text-slate-500 text-lg max-w-xl">Specializing in Agricultural Packaging and industrial visuals.</p>
        </section>

        <section id="projects" class="page container mx-auto px-4 py-10">
            <h2 class="text-4xl font-black mb-10">Portfolio</h2>
            <div id="gallery-root" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </section>

        <section id="contact" class="page container mx-auto px-4 py-10">
            <div class="max-w-4xl mx-auto bg-slate-900 rounded-[3rem] p-10 md:p-20 text-white">
                <h2 class="text-4xl font-black mb-10 italic">Get in Touch</h2>
                <form id="contact-form" class="space-y-4">
                    <input type="text" id="c_name" placeholder="Full Name" required class="w-full bg-slate-800 border-none rounded-2xl p-4 text-white outline-none">
                    <input type="email" id="c_email" placeholder="Email Address" required class="w-full bg-slate-800 border-none rounded-2xl p-4 text-white outline-none">
                    <textarea id="c_msg" placeholder="Your Project Details" required class="w-full bg-slate-800 border-none rounded-2xl p-4 text-white h-32 outline-none"></textarea>
                    <button type="submit" class="w-full bg-blue-600 py-4 rounded-2xl font-bold hover:bg-blue-700 transition">Send Inquiry</button>
                </form>
            </div>
        </section>

        <section id="admin" class="page container mx-auto px-4 py-10">
            <div class="bg-white p-6 md:p-10 rounded-[2.5rem] border shadow-sm">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-black">Admin <span class="text-blue-600">Leads</span></h2>
                    <button onclick="showPage('home')" class="bg-red-50 text-red-500 px-6 py-2 rounded-xl font-bold">Logout</button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-[10px] uppercase tracking-widest font-bold">
                                <th class="p-4">Name</th>
                                <th class="p-4">Email</th>
                                <th class="p-4">Message</th>
                                <th class="p-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="leads-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 1. NAVIGATION
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'admin') loadLeads();
            window.scrollTo(0,0);
        }

        function toggleMenu(open) {
            const menu = document.getElementById('mobile-menu');
            open ? menu.classList.add('open') : menu.classList.remove('open');
        }

        // 2. LEAD STORAGE
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const lead = {
                id: Date.now(),
                name: document.getElementById('c_name').value,
                email: document.getElementById('c_email').value,
                message: document.getElementById('c_msg').value
            };
            let leads = JSON.parse(localStorage.getItem('my_leads') || '[]');
            leads.push(lead);
            localStorage.setItem('my_leads', JSON.stringify(leads));
            alert("Success! Your message was sent to the Admin Panel.");
            this.reset();
        });

        // 3. RENDER TABLE
        function loadLeads() {
            const body = document.getElementById('leads-body');
            const leads = JSON.parse(localStorage.getItem('my_leads') || '[]');
            body.innerHTML = '';

            if(leads.length === 0) {
                body.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-300">No leads available.</td></tr>';
                return;
            }

            leads.forEach(l => {
                body.innerHTML += `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition">
                    <td class="p-4 font-bold text-sm">${l.name}</td>
                    <td class="p-4 text-blue-600 text-sm italic">${l.email}</td>
                    <td class="p-4 text-slate-500 text-xs">${l.message}</td>
                    <td class="p-4 text-right space-x-2">
                        <button onclick="directReply('${l.email}', '${l.name}')" class="text-blue-600 hover:bg-blue-600 hover:text-white p-2 rounded-lg transition border border-blue-600"><i class="fa-solid fa-reply"></i></button>
                        <button onclick="deleteLead(${l.id})" class="text-red-500 hover:bg-red-500 hover:text-white p-2 rounded-lg transition border border-red-500"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>`;
            });
        }

        // 4. DIRECT EMAIL REPLY (MAILTO)
        function directReply(email, name) {
            const feedback = prompt(`Type your feedback for ${name}:`);
            if(!feedback) return;

            const subject = encodeURIComponent("Feedback Regarding Your Design Inquiry");
            const body = encodeURIComponent(`Hello ${name},\n\n${feedback}\n\nBest Regards,\nSumanth G`);
            
            // This opens the user's local email app directly
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }

        // 5. DELETE LEAD
        function deleteLead(id) {
            if(confirm("Delete this lead?")) {
                let leads = JSON.parse(localStorage.getItem('my_leads') || '[]');
                leads = leads.filter(l => l.id !== id);
                localStorage.setItem('my_leads', JSON.stringify(leads));
                loadLeads();
            }
        }

        // 6. ADMIN SECURITY
        function accessAdmin() {
            const pin = prompt("Admin Key:");
            if(btoa(pin?.trim()) === "MjkwNA==") showPage('admin');
            else alert("Denied");
        }

        // GITHUB ASSETS LOAD
        async function loadAssets() {
            const root = document.getElementById('gallery-root');
            try {
                const res = await fetch(`https://api.github.com/repos/Sumanthg04/portfolio-assets/contents/projects`);
                const data = await res.json();
                if(Array.isArray(data)) {
                    root.innerHTML = '';
                    data.forEach(f => {
                        if(f.name.match(/\.(jpg|jpeg|png)$/i)) {
                            root.innerHTML += `<div class="bg-white p-4 rounded-3xl border shadow-sm"><img src="${f.download_url}" class="rounded-2xl w-full h-48 object-cover"></div>`;
                        }
                    });
                }
            } catch(e) {}
        }
        window.onload = loadAssets;
    </script>
</body>
</html>
